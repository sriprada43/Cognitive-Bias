<!-- index.html -->
{% extends "base.html" %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px">
  <div style="width:100%;max-width:420px">
    <div style="text-align:center;margin-bottom:32px">
      <div style="font-size:3rem;margin-bottom:12px">🛡️</div>
      <h1 style="font-family:var(--display);font-size:2rem;font-weight:800;color:var(--cyan);letter-spacing:2px">COGNITIVESHIELD</h1>
      <p style="color:var(--muted);font-size:11px;margin-top:8px">Social Engineering Defense Training Platform</p>
    </div>
    <div class="card" style="border-color:var(--cyan)">
      <div class="card-title"><span>🔐</span> ACCESS TERMINAL</div>
      <form method="POST">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="form-input" name="username" placeholder="Enter your username..." autofocus required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">ENTER SYSTEM →</button>
      </form>
      <p class="text-muted" style="font-size:10px;margin-top:10px;text-align:center">New users are automatically registered.</p>
    </div>
    <div class="card mt-12" style="padding:12px 16px">
      <div style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center;font-size:10px;color:var(--muted)">
        <span>🧠 7 cognitive biases</span>
        <span>🎯 Adaptive training</span>
        <span>🔬 Live detection</span>
        <span>📋 PDF reports</span>
        <span>🗺️ MITRE ATT&CK</span>
      </div>
    </div>
  </div>
</div>
{% endblock %}
